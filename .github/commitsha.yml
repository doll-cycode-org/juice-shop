name: CI Example

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Pinned to a specific commit SHA instead of @v4
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Pinned to a specific commit SHA instead of @main
      - name: Set up Node.js
        uses: actions/setup-node@1d43b566d287258113a31e290f5624570b4db3f6 # v4.1.0
        with:
          node-version: '20'

      - name: Install dependencies and test
        run: |
          npm ci
          npm test